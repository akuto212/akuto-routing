name: Sync Upstream Routing

on:
  workflow_dispatch:
  schedule:
    - cron: "20 6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-upstream-routing
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync only JSON and deeplinks
        shell: bash
        run: |
          set -euo pipefail
          export TZ=UTC

          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git remote add upstream https://github.com/hydraponique/roscomvpn-routing.git 2>/dev/null || \
            git remote set-url upstream https://github.com/hydraponique/roscomvpn-routing.git
          git fetch upstream main

          if [[ "$(git rev-list --count HEAD..upstream/main)" == "0" ]]; then
            echo "Already synced with upstream/main."
            exit 0
          fi

          base="$(git merge-base HEAD upstream/main)"
          allowed_re='^(HAPP|INCY)/(DEFAULT|WHITELIST|JSONSUB)\.(JSON|DEEPLINK)$'
          mapfile -t upstream_files < <(git diff --name-only "$base"..upstream/main)

          disallowed=()
          for file in "${upstream_files[@]}"; do
            if ! [[ "$file" =~ $allowed_re ]]; then
              disallowed+=("$file")
            fi
          done

          if (( ${#disallowed[@]} > 0 )); then
            echo "::warning::Skipping upstream sync because upstream changed files outside JSON/deeplink artifacts."
            printf 'Disallowed upstream files:\n'
            printf ' - %s\n' "${disallowed[@]}"
            exit 0
          fi

          json_files=(
            HAPP/DEFAULT.JSON
            HAPP/WHITELIST.JSON
            HAPP/JSONSUB.JSON
            INCY/DEFAULT.JSON
            INCY/WHITELIST.JSON
            INCY/JSONSUB.JSON
          )

          names_dir="$(mktemp -d)"
          for file in "${json_files[@]}"; do
            jq -r '.Name' "$file" > "$names_dir/${file//\//__}.name"
          done

          set +e
          git merge --no-ff --no-commit upstream/main
          merge_exit=$?
          set -e

          if (( merge_exit != 0 )); then
            mapfile -t unmerged_files < <(git diff --name-only --diff-filter=U)

            for file in "${unmerged_files[@]}"; do
              if ! [[ "$file" =~ $allowed_re ]]; then
                echo "::error::Merge conflict outside JSON/deeplink artifacts: $file"
                git merge --abort || true
                exit 1
              fi
            done

            for file in "${unmerged_files[@]}"; do
              if [[ "$file" == *.JSON ]]; then
                git checkout --theirs -- "$file"
              fi
            done
          fi

          for file in "${json_files[@]}"; do
            name="$(cat "$names_dir/${file//\//__}.name")"
            tmp="$(mktemp)"
            jq --arg name "$name" '.Name = $name' "$file" > "$tmp"
            mv "$tmp" "$file"
          done

          happ_default="$(jq -c . HAPP/DEFAULT.JSON | base64 -w 0)"
          happ_whitelist="$(jq -c . HAPP/WHITELIST.JSON | base64 -w 0)"
          happ_jsonsub="$(jq -c . HAPP/JSONSUB.JSON | base64 -w 0)"
          incy_default="$(jq -c . INCY/DEFAULT.JSON | base64 -w 0)"
          incy_whitelist="$(jq -c . INCY/WHITELIST.JSON | base64 -w 0)"
          incy_jsonsub="$(jq -c . INCY/JSONSUB.JSON | base64 -w 0)"

          printf 'happ://routing/onadd/%s\n' "$happ_default" > HAPP/DEFAULT.DEEPLINK
          printf 'happ://routing/onadd/%s\n' "$happ_whitelist" > HAPP/WHITELIST.DEEPLINK
          printf 'happ://routing/onadd/%s\n' "$happ_jsonsub" > HAPP/JSONSUB.DEEPLINK
          printf 'incy://routing/onadd/%s\n' "$incy_default" > INCY/DEFAULT.DEEPLINK
          printf 'incy://routing/onadd/%s\n' "$incy_whitelist" > INCY/WHITELIST.DEEPLINK
          printf 'incy://routing/onadd/%s\n' "$incy_jsonsub" > INCY/JSONSUB.DEEPLINK

          git add "${json_files[@]}" HAPP/*.DEEPLINK INCY/*.DEEPLINK

          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "::error::Unresolved merge conflicts remain."
            git merge --abort || true
            exit 1
          fi

          git commit -m "Sync upstream routing configs $(date -u +%Y%m%d%H%M)"
          git push
